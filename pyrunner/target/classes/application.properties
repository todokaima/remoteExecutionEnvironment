spring.application.name=pyrunner
server.port=8080

# Kubernetes execution settings
runner.k8s.namespace=sandbox
runner.k8s.image=python:3.11-slim
runner.timeout-seconds=30
runner.memory-limit=64Mi
runner.cpu-limit=500m

# Increase max request size for large scripts
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
